#--enable-features=UseOzonePlatform
#--ozone-platform=wayland

# Force native Wayland (prevents falling back to XWayland)
--ozone-platform-hint=wayland

# Enable VA-API hardware video decoding and encoding
--enable-features=VaapiVideoDecodeLinuxGL,AcceleratedVideoEncoder

# Enable GPU rasterization for smoother UI rendering and scrolling
--enable-gpu-rasterization

# Reduce CPU overhead by avoiding unnecessary memory copies in the graphics pipeline
--enable-zero-copy

# Bypass Chromium's built-in blocklist for hardware acceleration
--ignore-gpu-blocklist

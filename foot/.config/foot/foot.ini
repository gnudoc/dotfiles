[main]
include=~/.config/foot/themes/tokyonight
font=JetBrainsMono NF:size=12
pad=8x8
term=xterm-256color
shell=/run/current-system/sw/bin/zsh

[colors]
alpha=0.95

[cursor]
style=block
blink=yes

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000

[url]
launch=xdg-open ${url}
osc8-underline=url-mode
